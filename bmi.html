<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Free BMI Calculator. Check your body mass index instantly. Learn what your BMI number means and whether you're in a healthy range.">
<title>BMI Calculator - QuickTools</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="index.html" class="logo">QuickTools</a>
  <a href="bmi.html">BMI</a>
  <a href="age.html">Age</a>
  <a href="currency.html">Currency</a>
  <a href="tip.html">Tip</a>
  <a href="about.html">About</a>
</nav>

<div class="container">
  <div class="card">
    <h1>BMI Calculator</h1>
    <div class="input-group">
      <label>Your Height (cm)</label>
      <input type="number" id="bmiHeight" placeholder="e.g. 170" min="50" max="250">
    </div>
    <div class="input-group">
      <label>Your Weight (kg)</label>
      <input type="number" id="bmiWeight" placeholder="e.g. 65" min="20" max="300">
    </div>
    <button class="btn" onclick="calcBMI()">Calculate My BMI</button>
    <div class="result" id="bmiResult">Enter your height and weight above</div>
    <p class="note">BMI categories: Underweight &lt;18.5 | Normal 18.5-24.9 | Overweight 25-29.9 | Obese &ge;30</p>
  </div>
  <p class="back-link"><a href="index.html">&larr; Back to all tools</a></p>
</div>

<footer>
  <p>QuickTools &copy; 2026 · <a href="privacy.html">Privacy Policy</a></p>
</footer>

<script>
function calcBMI() {
  var h=parseFloat(document.getElementById('bmiHeight').value)/100;
  var w=parseFloat(document.getElementById('bmiWeight').value);
  if(!h||!w||h<=0||w<=0){document.getElementById('bmiResult').innerHTML='Please enter valid height and weight';return;}
  var bmi=w/(h*h);
  var cat=bmi<18.5?'Underweight':bmi<25?'Normal weight':bmi<30?'Overweight':'Obese';
  document.getElementById('bmiResult').innerHTML='Your BMI is <strong>'+bmi.toFixed(1)+'</strong> &mdash; '+cat;
}
</script>
</body>
</html>
